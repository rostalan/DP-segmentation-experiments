# YOLOE with text prompts (RepRTA) for detection + segmentation

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 15
  max_frames: 10

inference:
  device: "cpu"
  confidence_threshold: 0.25
  iou_threshold: 0.5

class_names:
  - person
  - laptop
  - laptop battery
