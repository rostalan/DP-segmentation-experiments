# Panoptic segmentation with YOLO26x

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 12

model:
  input_size: 640
  confidence_threshold: 0.35
  iou_threshold: 0.4
  mask_threshold: 0.5

inference:
  device: "cpu"

tracking:
  enabled: true

output:
  show_labels: false

class_names:
