# Zero-shot segmentation: YOLO-World + SAM2 for any class by text description

paths:
  input_video: "../res/videos/VID2.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 10
  start_frame: 1

yolo:
  confidence_threshold: 0.25
  iou_threshold: 0.10

sam:
  points_per_side: null
  pred_iou_thresh: 0.88
  stability_score_thresh: 0.95

tracking:
  enabled: true
  tracker_type: "botsort.yaml"
  persist: true

class_names:
  - person
  - yellow plastic box
  - battery
