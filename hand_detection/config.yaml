# Hand Detection (MediaPipe)

paths:
  input_video: "../res/videos/VID7.mp4"
  output_dir: "output/frames"

sampling:
  frame_interval: 20              # Process every Nth frame

mediapipe:
  mode: "gestures"               # "landmarks" or "gestures"
  model_path_landmarks: "../models/hand_landmarker.task"
  model_path_gestures: "../models/gesture_recognizer.task"
  max_num_hands: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

output:
  save_crop: false               # Save cropped images of detected hands
