# YOLO-World for open-vocabulary detection + YOLOE for segmentation

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 10
  start_frame: 18
  max_frames: 50

yolo_world:
  confidence_threshold: 0.15
  iou_threshold: 0.45
  imgsz: 640

yoloe:
  imgsz: 640
  conf: 0.15

inference:
  device: "cpu"

custom_classes:
  - person
  - hand
  - black and white laptop
  - long black laptop battery
