# SAM2-only: automatic segmentation of all objects (no detection model)

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 15

sam2:
  points_per_side: 16
  pred_iou_thresh: 0.88
  stability_score_thresh: 0.95
  min_mask_region_area: 500

inference:
  imgsz: 640

tracking:
  enabled: true

output:
  show_labels: false
  show_track_id: true
