# Fast zero-shot segmentation: YOLO-World + FastSAM (~50x faster than SAM)

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 15

yolo:
  confidence_threshold: 0.25
  iou_threshold: 0.5

fastsam:
  conf: 0.4
  iou: 0.9
  retina_masks: true

output:
  show_track_id: true

class_names:
  - person
  - laptop
  - laptop battery
