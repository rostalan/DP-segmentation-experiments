# Depth Anything V2: depth maps from video frames

paths:
  input_video: "../res/videos/VID1.mkv"
  output_dir: "output/frames"

sampling:
  frame_interval: 2               # Process every Nth frame
  start_frame: 200               # First frame to process
  max_frames: 30                 # Maximum frames to process (null = all)

model:
  encoder: "vitl"                # vitl, vitb, or vits (must match model file)
  input_size: 518                # Input size for the model

output:
  save_rgb: true
  save_depth_raw: true
  save_depth_colored: true
  save_depth_grayscale: true
  colormap: "inferno"

pointcloud:
  focal_length_x: 1600.0
  focal_length_y: 1600.0
  principal_point_x: null
  principal_point_y: null
  depth_scale: 10.0
  depth_offset: 20.0
  depth_min: 0.1
  depth_max: 50.0
  invert_depth: true
  flip_y: false
  downsample: true
  downsample_factor: 2
  voxel_size: null
  remove_outliers: false
  outlier_nb_neighbors: 20
  outlier_std_ratio: 2.0

motion:
  pcd1: "output/frames/pointclouds/frame_000200.ply"
  pcd2: "output/frames/pointclouds/frame_000202.ply"
  distance_threshold: 0.25
  output_dir: "output/frames/motion"
  highlight_color: [1.0, 0.3, 0.0]
  keep_original_colors: false
